name: azure-service-bus-cloud-parity

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_FILE: LayerZero.slnx
  LAYERZERO_AZURE_SERVICE_BUS_CLOUD_CONNECTION_STRING: ${{ secrets.LAYERZERO_AZURE_SERVICE_BUS_CLOUD_CONNECTION_STRING }}
  LAYERZERO_AZURE_SERVICE_BUS_CLOUD_ADMIN_CONNECTION_STRING: ${{ secrets.LAYERZERO_AZURE_SERVICE_BUS_CLOUD_ADMIN_CONNECTION_STRING }}

jobs:
  cloud-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate Azure Service Bus Cloud Secrets
        run: |
          if [ -z "$LAYERZERO_AZURE_SERVICE_BUS_CLOUD_CONNECTION_STRING" ]; then
            echo "Missing secret LAYERZERO_AZURE_SERVICE_BUS_CLOUD_CONNECTION_STRING." >&2
            exit 1
          fi

      - name: Restore
        run: dotnet restore $SOLUTION_FILE

      - name: Build
        run: dotnet build $SOLUTION_FILE --no-restore

      - name: Run Azure Service Bus Cloud Parity Tests
        run: dotnet test $SOLUTION_FILE --no-build --filter "FullyQualifiedName~CloudAzureServiceBus" --logger trx --results-directory ./artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-service-bus-cloud-parity-test-results
          path: artifacts/test-results
          if-no-files-found: ignore
