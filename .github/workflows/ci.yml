name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_FILE: LayerZero.slnx

jobs:
  dotnet:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Verify Docker
        run: docker version

      - name: Restore
        run: dotnet restore $SOLUTION_FILE

      - name: Build
        run: dotnet build $SOLUTION_FILE --no-restore

      - name: Test
        run: dotnet test $SOLUTION_FILE --no-build --filter "FullyQualifiedName!~CloudAzureServiceBus" --logger trx --results-directory ./artifacts/test-results

      - name: Pack
        run: dotnet pack $SOLUTION_FILE --no-build --output ./artifacts/packages

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results
          if-no-files-found: ignore

      - name: Upload packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/packages
          if-no-files-found: ignore
